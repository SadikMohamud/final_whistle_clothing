{% load static %}
<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Email Confirmation | Final Whistle Clothing</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{% static 'shop/css/site.css' %}">
	<style>
		.auth-topbar { position: fixed; top: 16px; right: 16px; z-index: 1000; display: flex; gap: 8px; }
		.auth-shell { min-height: 100vh; display: grid; place-items: center; padding: 32px 16px; border-radius: 14px; }
		.auth-card { width: 100%; max-width: 540px; background: var(--mid); border: 1px solid var(--border); padding: 28px; text-align: center; }
		.auth-brand { font-family: var(--font-display); font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 20px; text-decoration: none; color: var(--white); display: inline-block; }
		.auth-brand span { color: var(--volt); }
		.auth-title { font-family: var(--font-display); font-size: 44px; line-height: 0.95; text-transform: uppercase; margin-bottom: 10px; }
		.auth-sub { color: rgba(245,245,240,0.55); font-size: 14px; margin-bottom: 18px; }
		.actions { display: grid; grid-template-columns: 1fr; gap: 10px; }
		.btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; border: 1px solid var(--border); padding: 11px 12px; font-family: var(--font-display); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; text-decoration: none; }
		.btn-primary { background: var(--volt); color: var(--black); border-color: var(--volt); }
		.btn-secondary { color: var(--white); }
		@media (min-width: 640px) { .actions { grid-template-columns: 1fr 1fr; } }
	</style>
</head>
<body>
	<div class="cursor" id="cursor"></div>
	<div class="cursor-ring" id="cursorRing"></div>
	<div class="auth-topbar">
		<button type="button" id="langToggle" class="toggle-chip">NL</button>
		<button type="button" id="themeToggle" class="toggle-chip" data-i18n="theme_dark">Donker</button>
	</div>
	<section class="auth-shell">
		<div class="auth-card">
			<a href="{% url 'home' %}" class="auth-brand">Final<span>.</span>Whistle</a>
			<h1 class="auth-title">Confirm Email</h1>
			<p class="auth-sub">Please check your inbox and confirm your email before signing in.</p>
			<div class="actions">
				<a class="btn btn-primary" href="{% url 'account_login' %}">Go to Sign In</a>
				<a class="btn btn-secondary" href="{% url 'home' %}">Back Home</a>
			</div>
		</div>
	</section>
	<script src="{% static 'shop/js/site.js' %}"></script>
</body>
</html>
