{% load static %}
<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign In | Final Whistle Clothing</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{% static 'shop/css/site.css' %}">
	<style>
		.auth-topbar { position: fixed; top: 16px; right: 16px; z-index: 1000; display: flex; gap: 8px; }
		.auth-shell { min-height: 100vh; display: grid; place-items: center; padding: 32px 16px; border-radius: 14px; }
		.auth-card { width: 100%; max-width: 460px; background: var(--mid); border: 1px solid var(--border); padding: 28px; }
		.auth-brand { font-family: var(--font-display); font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 20px; text-decoration: none; color: var(--white); display: inline-block; }
		.auth-brand span { color: var(--volt); }
		.auth-title { font-family: var(--font-display); font-size: 44px; line-height: 0.95; text-transform: uppercase; margin-bottom: 12px; }
		.auth-sub { color: rgba(245,245,240,0.55); font-size: 14px; margin-bottom: 18px; }
		.auth-card p { margin-bottom: 10px; color: rgba(245,245,240,0.8); font-size: 13px; }
		.auth-card input { width: 100%; border: 1px solid var(--border); background: #0c0c0c; color: var(--white); padding: 12px; font-size: 14px; }
		.auth-card input:focus { outline: none; border-color: var(--volt); }
		.auth-card button { width: 100%; margin-top: 6px; background: var(--volt); color: var(--black); border: 1px solid var(--volt); padding: 12px; font-family: var(--font-display); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
	</style>
</head>
<body>
	<div class="cursor" id="cursor"></div>
	<div class="cursor-ring" id="cursorRing"></div>
	<div class="auth-topbar">
		<button type="button" id="langToggle" class="toggle-chip">NL</button>
		<button type="button" id="themeToggle" class="toggle-chip" data-i18n="theme_dark">Donker</button>
	</div>
	<section class="auth-shell">
		<div class="auth-card">
			<a href="{% url 'home' %}" class="auth-brand">Final<span>.</span>Whistle</a>
			<h1 class="auth-title">Sign In</h1>
			<p class="auth-sub">Use your account credentials to continue.</p>
			<form method="post">
				{% csrf_token %}
				{{ form.as_p }}
				<button type="submit">Sign In</button>
			</form>
		</div>
	</section>
	<script src="{% static 'shop/js/site.js' %}"></script>
</body>
</html>
