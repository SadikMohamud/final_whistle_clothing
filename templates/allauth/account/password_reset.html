{% load static %}
<!DOCTYPE html>
<html lang="nl" data-lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset | Final Whistle Clothing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'shop/css/site.css' %}">
  <style>
    .shell { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .card { width: 100%; max-width: 520px; border: 1px solid var(--border); background: rgba(8,8,8,0.9); padding: 24px; }
    .title { font-family: var(--font-display); font-size: 46px; line-height: .95; text-transform: uppercase; margin: 8px 0; }
    .card input { width: 100%; border: 1px solid var(--border); background: #0d0d0d; color: #f5f5f0; padding: 12px; }
    .card button { width: 100%; margin-top: 12px; }
  </style>
</head>
<body>
  <section class="shell">
    <div class="card">
      <a href="{% url 'home' %}" class="auth-brand">Final<span>.</span>Whistle</a>
      <h1 class="title">Reset Password</h1>
      <p>Enter your account email and we will send a reset link.</p>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn-primary" type="submit">Send reset link</button>
      </form>
    </div>
  </section>
</body>
</html>
