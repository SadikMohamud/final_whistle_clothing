{% load static %}
<!DOCTYPE html>
<html lang="nl" data-lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password | Final Whistle Clothing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'shop/css/site.css' %}">
  <style>
    .auth-shell { min-height: 100vh; display: grid; place-items: center; padding: 32px 16px; }
    .auth-card { width: 100%; max-width: 520px; background: var(--mid); border: 1px solid var(--border); padding: 32px; }
    .auth-brand { font-family: var(--font-display); font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 24px; text-decoration: none; color: var(--white); display: inline-block; }
    .auth-brand span { color: var(--volt); }
    .auth-title { font-family: var(--font-display); font-size: 42px; line-height: 0.95; text-transform: uppercase; margin-bottom: 16px; }
    .auth-sub { color: rgba(245,245,240,0.65); font-size: 15px; line-height: 1.6; margin-bottom: 16px; }
    .auth-card input { width: 100%; border: 1px solid var(--border); background: rgba(12,12,12,0.9); color: var(--white); padding: 14px; margin-bottom: 12px; }
    .auth-card label { display: block; margin: 10px 0 6px; font-family: var(--font-display); letter-spacing: 0.1em; text-transform: uppercase; font-size: 11px; }
    .auth-card ul.errorlist { margin: 0 0 10px; color: #ff9d9d; }
  </style>
</head>
<body>
  <section class="auth-shell">
    <div class="auth-card">
      <a href="{% url 'home' %}" class="auth-brand">Final<span>.</span>Whistle</a>
      <h1 class="auth-title">New Password</h1>
      {% if token_fail %}
        <p class="auth-sub">This reset link is invalid or expired. Please request a new one.</p>
        <a class="btn-primary" href="{% url 'account_reset_password' %}">Request new reset link</a>
      {% else %}
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn-primary" type="submit">Update password</button>
        </form>
      {% endif %}
    </div>
  </section>
  <script src="{% static 'shop/js/site.js' %}"></script>
</body>
</html>
