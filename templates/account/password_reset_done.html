{% load static %}
<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset Sent | Final Whistle Clothing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'shop/css/site.css' %}">
  <style>
    .auth-shell { min-height: 100vh; display: grid; place-items: center; padding: 32px 16px; }
    .auth-card { width: 100%; max-width: 520px; background: var(--mid); border: 1px solid var(--border); padding: 32px; text-align: center; }
    .auth-brand { font-family: var(--font-display); font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 24px; text-decoration: none; color: var(--white); display: inline-block; }
    .auth-brand span { color: var(--volt); }
    .auth-title { font-family: var(--font-display); font-size: 42px; line-height: 0.95; text-transform: uppercase; margin-bottom: 14px; }
    .auth-sub { color: rgba(245,245,240,0.65); font-size: 15px; line-height: 1.6; margin-bottom: 18px; }
  </style>
</head>
<body>
  <section class="auth-shell">
    <div class="auth-card">
      <a href="{% url 'home' %}" class="auth-brand">Final<span>.</span>Whistle</a>
      <h1 class="auth-title">Check Your Email</h1>
      <p class="auth-sub">If an account exists for this email address, a password reset link has been sent.</p>
      <a class="btn-primary" href="{% url 'customer_login' %}">Back to login</a>
    </div>
  </section>
  <script src="{% static 'shop/js/site.js' %}"></script>
</body>
</html>
