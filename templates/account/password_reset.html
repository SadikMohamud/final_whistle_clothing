{% load static %}
<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset | Final Whistle Clothing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'shop/css/site.css' %}">
  <style>
    .auth-topbar { position: fixed; top: 16px; right: 16px; z-index: 1000; display: flex; gap: 8px; }
    .auth-shell { min-height: 100vh; display: grid; place-items: center; padding: 32px 16px; border-radius: 14px; }
    .auth-card { width: 100%; max-width: 460px; background: var(--mid); border: 1px solid var(--border); padding: 32px; box-shadow: 0 14px 34px rgba(0,0,0,0.24); }
    .auth-brand { font-family: var(--font-display); font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 24px; text-decoration: none; color: var(--white); display: inline-block; }
    .auth-brand span { color: var(--volt); }
    .auth-title { font-family: var(--font-display); font-size: 48px; line-height: 0.95; text-transform: uppercase; margin-bottom: 18px; }
    .auth-sub { color: rgba(245,245,240,0.55); font-size: 14px; margin-bottom: 28px; }
    .auth-label { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(245,245,240,0.7); display: block; margin-bottom: 8px; }
    .auth-input { width: 100%; border: 1px solid var(--border); background: rgba(12,12,12,0.9); color: var(--white); padding: 14px 14px; font-size: 14px; margin-bottom: 16px; }
    .auth-input:focus { outline: none; border-color: var(--volt); }
    .auth-submit { width: 100%; margin-top: 6px; }
    .auth-error { border: 1px solid rgba(255,90,90,0.5); background: rgba(255,90,90,0.12); color: #ff9d9d; padding: 10px 12px; margin-bottom: 14px; font-size: 13px; }
    body[data-theme='light'] .auth-card {
      background: rgba(255,255,255,0.82);
      border-color: rgba(0,0,0,0.14);
      box-shadow: 0 14px 32px rgba(14, 22, 6, 0.12);
    }
    body[data-theme='light'] .auth-brand,
    body[data-theme='light'] .auth-title {
      color: #101010;
    }
    body[data-theme='light'] .auth-sub,
    body[data-theme='light'] .auth-label {
      color: rgba(16,16,16,0.72);
    }
    body[data-theme='light'] .auth-input {
      background: #f8f8f3;
      color: #101010;
      border-color: rgba(0,0,0,0.18);
    }
    body[data-theme='light'] .auth-error {
      border-color: rgba(202, 42, 42, 0.32);
      background: rgba(202, 42, 42, 0.1);
      color: #7b1e1e;
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="auth-topbar">
    <button type="button" id="langToggle" class="toggle-chip">NL</button>
    <button type="button" id="themeToggle" class="toggle-chip" data-i18n="theme_dark">Donker</button>
  </div>

  <section class="auth-shell">
    <div class="auth-card fade-up visible">
      <a href="{% url 'home' %}" class="auth-brand">Final<span>.</span>Whistle</a>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-sub">Enter your account email and we will send a reset link.</p>

      {% if form.non_field_errors %}
      <div class="auth-error">{{ form.non_field_errors }}</div>
      {% endif %}

      <form method="post" action="{% url 'account_reset_password' %}">
        {% csrf_token %}
        <label class="auth-label" for="id_email">E-mail</label>
        <input
          class="auth-input"
          id="id_email"
          name="email"
          type="email"
          value="{{ form.email.value|default_if_none:'' }}"
          required
        >
        {% if form.email.errors %}
        <div class="auth-error">{{ form.email.errors }}</div>
        {% endif %}

        <button class="btn-primary auth-submit" type="submit">Send reset link</button>
      </form>
    </div>
  </section>

  <script src="{% static 'shop/js/site.js' %}"></script>
</body>
</html>
