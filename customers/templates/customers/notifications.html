{% load static %}
<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications | Final Whistle Clothing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'shop/css/site.css' %}">
  <style>
    .account-topbar { position: fixed; top: 16px; right: 16px; z-index: 1000; display: flex; gap: 8px; }
    .notify-shell { width: 100%; max-width: 760px; margin: 0 auto; padding: 84px 14px 28px; }
    .notify-card { border: 1px solid var(--border); background: rgba(8,8,8,0.9); padding: 16px; }
    .notify-title { font-family: var(--font-display); font-size: clamp(30px, 12vw, 44px); line-height: 0.95; text-transform: uppercase; margin-bottom: 14px; }
    .check { display: flex; align-items: center; gap: 8px; margin: 10px 0; font-size: 13px; }
    .field { margin: 12px 0; }
    .field label { display: block; margin-bottom: 6px; color: rgba(245,245,240,0.82); font-size: 12px; }
    .field select { width: 100%; border: 1px solid var(--border); background: rgba(17,17,17,0.62); color: var(--white); padding: 12px; font-size: 14px; }
    .actions { margin-top: 14px; }
    .btn { display: inline-flex; justify-content: center; align-items: center; width: 100%; border: 1px solid var(--volt); background: var(--volt); color: var(--black); text-decoration: none; padding: 11px 12px; font-family: var(--font-display); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }
    .msg { border: 1px solid var(--border); padding: 10px 12px; margin-bottom: 12px; font-size: 13px; }
    .msg.success { color: var(--volt); background: rgba(245,245,240,0.12); }
    .msg.error { color: #ff8b8b; background: rgba(255,107,107,0.14); }
    @media (min-width: 760px) { .notify-shell { padding: 96px 20px 40px; } }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="account-topbar">
    <button type="button" id="langToggle" class="toggle-chip">NL</button>
    <button type="button" id="themeToggle" class="toggle-chip" data-i18n="theme_dark">Donker</button>
  </div>

  <main class="notify-shell">
    <section class="notify-card">
      <h1 class="notify-title">Notifications</h1>

      {% if message %}<div class="msg {{ message_type }}">{{ message }}</div>{% endif %}

      <form method="post">
        {% csrf_token %}
        <label class="check"><input type="checkbox" name="email_order_updates" {% if notifications.email_order_updates %}checked{% endif %}> Order updates</label>
        <label class="check"><input type="checkbox" name="email_promotional" {% if notifications.email_promotional %}checked{% endif %}> Promotional emails</label>
        <label class="check"><input type="checkbox" name="email_newsletter" {% if notifications.email_newsletter %}checked{% endif %}> Newsletter emails</label>
        <label class="check"><input type="checkbox" name="email_product_reviews" {% if notifications.email_product_reviews %}checked{% endif %}> Product review requests</label>

        <div class="field">
          <label for="newsletter_frequency">Newsletter Frequency</label>
          <select id="newsletter_frequency" name="newsletter_frequency">
            <option value="daily" {% if notifications.newsletter_frequency == 'daily' %}selected{% endif %}>Daily</option>
            <option value="weekly" {% if notifications.newsletter_frequency == 'weekly' %}selected{% endif %}>Weekly</option>
            <option value="monthly" {% if notifications.newsletter_frequency == 'monthly' %}selected{% endif %}>Monthly</option>
            <option value="never" {% if notifications.newsletter_frequency == 'never' %}selected{% endif %}>Never</option>
          </select>
        </div>

        <div class="actions">
          <button class="btn" type="submit">Save Preferences</button>
        </div>
      </form>
    </section>
  </main>

  <script src="{% static 'shop/js/site.js' %}"></script>
</body>
</html>
