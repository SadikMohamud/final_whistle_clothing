{% load static %}
<!DOCTYPE html>
<html lang="nl" data-lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile | Final Whistle Clothing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'shop/css/site.css' %}">
  <style>
    .account-topbar { position: fixed; top: 16px; right: 16px; z-index: 1000; display: flex; gap: 8px; }
    .edit-shell { width: 100%; max-width: 760px; margin: 0 auto; padding: 84px 14px 28px; }
    .edit-card { border: 1px solid var(--border); background: rgba(8,8,8,0.9); padding: 16px; }
    .edit-title { font-family: var(--font-display); font-size: clamp(30px, 12vw, 44px); line-height: 0.95; text-transform: uppercase; margin-bottom: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .field { margin-bottom: 10px; }
    .field label { display: block; margin-bottom: 6px; font-size: 12px; color: rgba(245,245,240,0.8); }
    .field input, .field select { width: 100%; border: 1px solid var(--border); background: rgba(17,17,17,0.62); color: var(--white); padding: 12px; font-size: 14px; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--volt); }
    .check { display: flex; align-items: center; gap: 8px; margin: 10px 0; font-size: 13px; }
    .actions { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 14px; }
    .btn { display: inline-flex; justify-content: center; align-items: center; width: 100%; padding: 12px 16px; border: 1px solid var(--border); text-decoration: none; font-family: var(--font-display); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }
    .btn-primary { background: var(--volt); color: var(--black); border-color: var(--volt); }
    .btn-secondary { color: var(--white); }
    .btn-secondary:hover { color: var(--volt); border-color: var(--volt); }
    .msg { border: 1px solid var(--border); padding: 10px 12px; margin-bottom: 12px; font-size: 13px; }
    .msg.success { color: var(--volt); background: rgba(245,245,240,0.12); }
    .msg.error { color: #ff8b8b; background: rgba(255,107,107,0.14); }
    @media (min-width: 680px) {
      .edit-shell { padding: 94px 20px 34px; }
      .form-row { grid-template-columns: 1fr 1fr; }
      .actions { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="account-topbar">
    <button type="button" id="langToggle" class="toggle-chip">NL</button>
    <button type="button" id="themeToggle" class="toggle-chip" data-i18n="theme_dark">Donker</button>
  </div>

  <main class="edit-shell">
    <section class="edit-card">
      <h1 class="edit-title">Edit Profile</h1>

      {% if message %}<div class="msg success">{{ message }}</div>{% endif %}
      {% if error %}<div class="msg error">{{ error }}</div>{% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="form-row">
          <div class="field">
            <label for="first_name">First Name</label>
            <input id="first_name" name="first_name" type="text" value="{{ profile.first_name|default:'' }}">
          </div>
          <div class="field">
            <label for="last_name">Last Name</label>
            <input id="last_name" name="last_name" type="text" value="{{ profile.last_name|default:'' }}">
          </div>
        </div>

        <div class="form-row">
          <div class="field">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="text" value="{{ profile.phone|default:'' }}">
          </div>
          <div class="field">
            <label for="country">Country</label>
            <input id="country" name="country" type="text" value="{{ profile.country|default:'NL' }}">
          </div>
        </div>

        <div class="form-row">
          <div class="field">
            <label for="city">City</label>
            <input id="city" name="city" type="text" value="{{ profile.city|default:'' }}">
          </div>
          <div class="field">
            <label for="postal_code">Postal Code</label>
            <input id="postal_code" name="postal_code" type="text" value="{{ profile.postal_code|default:'' }}">
          </div>
        </div>

        <div class="field">
          <label for="street_address">Street Address</label>
          <input id="street_address" name="street_address" type="text" value="{{ profile.street_address|default:'' }}">
        </div>

        <div class="field">
          <label for="preferred_language">Preferred Language</label>
          <select id="preferred_language" name="preferred_language">
            <option value="nl" {% if profile.preferred_language == 'nl' %}selected{% endif %}>Dutch</option>
            <option value="en" {% if profile.preferred_language == 'en' %}selected{% endif %}>English</option>
            <option value="de" {% if profile.preferred_language == 'de' %}selected{% endif %}>German</option>
            <option value="fr" {% if profile.preferred_language == 'fr' %}selected{% endif %}>French</option>
          </select>
        </div>

        <label class="check"><input type="checkbox" name="newsletter_subscription" {% if profile.newsletter_subscription %}checked{% endif %}> Subscribe to newsletter</label>
        <label class="check"><input type="checkbox" name="marketing_consent" {% if profile.marketing_consent %}checked{% endif %}> Marketing consent</label>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Save Changes</button>
          <a class="btn btn-secondary" href="{% url 'customer_profile' %}">Back to Account</a>
        </div>
      </form>
    </section>
  </main>

  <script src="{% static 'shop/js/site.js' %}"></script>
</body>
</html>
